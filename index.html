<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中3定期・入試対策 爆速5問タイムアタック</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #4ade80;
            --incorrect: #f87171;
            --timer-bg: #ef4444;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        h1 { font-size: 1.3rem; text-align: center; color: var(--accent); margin-top: 0; margin-bottom: 15px; }
        
        .select-title { font-size: 0.95rem; margin-bottom: 10px; text-align: center; color: var(--text-muted); }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .menu-btn {
            padding: 15px 10px; border: none; border-radius: 8px;
            background: #334155; color: var(--text); cursor: pointer; font-weight: bold; font-size: 0.95rem;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: #475569; }
        .menu-btn.all { grid-column: span 2; background: var(--accent); color: var(--bg-color); }
        .menu-btn.all:hover { background: var(--accent-hover); }
        .menu-btn.review-btn { grid-column: span 2; background: #f59e0b; color: #000; }
        
        .timer-container { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin-bottom: 15px; overflow: hidden; display: none; }
        .timer-bar { width: 100%; height: 100%; background: var(--timer-bg); transform-origin: left; transition: transform 0.1s linear; }

        .badge {
            background: #f59e0b; color: #000; padding: 4px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold; display: inline-block; margin-bottom: 8px;
        }
        .quiz-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .question-box { font-size: 1.05rem; font-weight: bold; margin-bottom: 15px; line-height: 1.5; min-height: 60px; white-space: pre-line; }
        .options-list { display: flex; flex-direction: column; gap: 8px; }
        .option-btn {
            padding: 12px; border: 1px solid #475569; border-radius: 8px;
            background: transparent; color: var(--text); text-align: left; cursor: pointer; font-size: 0.95rem;
            transition: background 0.1s;
        }
        .option-btn:hover { background: #334155; }
        .option-btn.correct-ans { background: var(--correct) !important; color: #000 !important; border-color: var(--correct) !important; font-weight: bold; }
        .option-btn.incorrect-ans { background: var(--incorrect) !important; color: #000 !important; border-color: var(--incorrect) !important; }
        .feedback { font-weight: bold; margin-top: 12px; text-align: center; font-size: 1rem; min-height: 24px; }
        .feedback.correct-text { color: var(--correct); }
        .feedback.incorrect-text { color: var(--incorrect); }
        
        .result-screen { text-align: center; display: none; }
        .score { font-size: 1.8rem; font-weight: bold; color: var(--accent); margin: 15px 0; }
        .reset-btn { background: #475569; color: var(--text); width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="app-title">⚡ 5教科爆速5問タイムアタック</h1>
    
    <div id="menu-screen">
        <div class="select-title">挑戦する教科を選択してください（毎回5問ランダム選出）</div>
        <div class="subject-grid">
            <button class="menu-btn all" onclick="startQuiz('all')">全5教科ランダム (5問)</button>
            <button class="menu-btn" onclick="startQuiz('国語')">国語 (30問)</button>
            <button class="menu-btn" onclick="startQuiz('社会')">社会 (100問)</button>
            <button class="menu-btn" onclick="startQuiz('数学')">数学 (30問)</button>
            <button class="menu-btn" onclick="startQuiz('理科')">理科 (30問)</button>
            <button class="menu-btn" onclick="startQuiz('英語')">英語 (30問)</button>
            <button class="menu-btn review-btn" onclick="startQuiz('review')">弱点克服モード (<span id="review-count">0</span>)</button>
        </div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="timer-container" id="timer-wraper">
            <div class="timer-bar" id="timer-bar"></div>
        </div>
        <div id="review-badge" class="badge" style="display: none;">💡 前回ミス問題</div>
        <div class="quiz-header">
            <span id="quiz-category">教科</span>
            <span id="quiz-progress">1 / 5</span>
        </div>
        <div class="question-box" id="question-text">問題文</div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback" id="feedback-text"></div>
    </div>

    <div id="result-screen" class="result-screen">
        <h2>🏁 1クール（5問）終了！</h2>
        <div class="score" id="final-score">0 / 5 問正解</div>
        <p id="result-msg">間違えた問題・時間切れは自動で「弱点克服」にストックされます。</p>
        <button class="menu-btn all" style="width: 100%;" onclick="showMenu()">トップに戻る</button>
        <button class="reset-btn" onclick="clearData()">弱点記録をリセット</button>
    </div>
</div>

<script>
// 総数220問の超巨大データベース
const quizData = [
    // ＝＝＝＝＝ 国語（30問） ＝＝＝＝＝

    { id: "J2", cat: "国語", q: "次の白文にレ点がついている場合、読む順番はどうなるか。\n①見 [レ点] ②物", a: "② → ①", o: ["① → ②", "② → ①", "①のみ読む", "どちらも読まない"] },

    { id: "J5", cat: "国語", q: "「学びて時にこれを習ふ、亦た説ばしからずや」の「説（よろこ）ばし」の現代語訳として正しいものは？", a: "（心がうきうきするほど）嬉しい、喜ばしい", o: ["退屈である", "（心がうきうきするほど）嬉しい、喜ばしい", "納得がいかない", "他人に説明しやすい"] },

let currentPool = [];
let currentIndex = 0;
let score = 0;
let hasAnswered = false;

// 1クールあたりの出題数を5問に設定
const QUESTIONS_PER_ROUND = 5;

let timeLimit = 20; 
let timeLeft = 0;
let timerInterval = null;
const timerUpdateInterval = 100; 

getMissedIds = () => JSON.parse(localStorage.getItem('missed_questions')) || [];
saveMissedIds = (ids) => localStorage.setItem('missed_questions', JSON.stringify(ids));

function updateReviewCount() {
    document.getElementById('review-count').innerText = getMissedIds().length;
}

function showMenu() {
    document.getElementById('menu-screen').style.display = 'block';
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('timer-wraper').style.display = 'none';
    document.getElementById('app-title').innerText = "⚡ 5教科爆速5問タイムアタック";
    clearInterval(timerInterval);
    updateReviewCount();
}

function startQuiz(mode) {
    const missedIds = getMissedIds();
    
    if (mode === 'all') {
        currentPool = [...quizData];
        document.getElementById('app-title').innerText = "⚡ 全5教科ランダム集中強化";
    } else if (mode === 'review') {
        currentPool = quizData.filter(item => missedIds.includes(item.id));
        if (currentPool.length === 0) {
            alert('現在、弱点問題はありません！通常モードを解いてみよう。');
            return;
        }
        document.getElementById('app-title').innerText = "⚡ 弱点リベンジマッチ";
    } else {
        currentPool = quizData.filter(item => item.cat === mode);
        document.getElementById('app-title').innerText = `⚡ 強化モード：${mode}`;
    }

    // 毎回完全に配列をランダムシャッフル
    currentPool.sort(() => Math.random() - 0.5);
    
    // 【仕様変更】1クール最大5問に厳選して抽出
    if (currentPool.length > QUESTIONS_PER_ROUND) {
        currentPool = currentPool.slice(0, QUESTIONS_PER_ROUND);
    }

    currentIndex = 0;
    score = 0;
    
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('timer-wraper').style.display = 'block';
    
    showQuestion();
}

function showQuestion() {
    hasAnswered = false;
    document.getElementById('feedback-text').innerText = '';
    document.getElementById('feedback-text').className = 'feedback';
    
    const currentQ = currentPool[currentIndex];
    const missedIds = getMissedIds();

    // 過去に一回でもミスした問題ならバッジが自動点灯
    document.getElementById('review-badge').style.display = missedIds.includes(currentQ.id) ? 'inline-block' : 'none';
    
    document.getElementById('quiz-category').innerText = `【${currentQ.cat}】`;
    document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${currentPool.length}`;
    document.getElementById('question-text').innerText = currentQ.q;

    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';

    // 選択肢の並び順も毎回バラバラにする
    const shuffledOptions = [...currentQ.o].sort(() => Math.random() - 0.5);
    shuffledOptions.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => selectOption(btn, opt, currentQ.a, currentQ.id);
        optionsContainer.appendChild(btn);
    });

    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = timeLimit;
    const timerBar = document.getElementById('timer-bar');
    timerBar.style.transform = 'scaleX(1)';

    const totalSteps = (timeLimit * 1000) / timerUpdateInterval;
    let currentStep = totalSteps;

    timerInterval = setInterval(() => {
        currentStep--;
        const scale = currentStep / totalSteps;
        timerBar.style.transform = `scaleX(${scale})`;

        if (currentStep <= 0) {
            clearInterval(timerInterval);
            timeOver();
        }
    }, timerUpdateInterval);
}

function selectOption(selectedBtn, chosen, correct, qId) {
    if (hasAnswered) return;
    hasAnswered = true;
    clearInterval(timerInterval);

    const optionsContainer = document.getElementById('options-container');
    const buttons = optionsContainer.getElementsByClassName('option-btn');
    const feedback = document.getElementById('feedback-text');
    let missedIds = getMissedIds();

    if (chosen === correct) {
        selectedBtn.classList.add('correct-ans');
        feedback.innerText = '⭕ 正解！';
        feedback.className = 'feedback correct-text';
        score++;
        // 正解したら弱点リストから自動削除
        missedIds = missedIds.filter(id => id !== qId);
    } else {
        selectedBtn.classList.add('incorrect-ans');
        feedback.innerText = `❌ 不正解!（正解: ${correct}）`;
        feedback.className = 'feedback incorrect-text';
        // 間違えたら弱点リストにストック
        if (!missedIds.includes(qId)) missedIds.push(qId);
        
        for (let btn of buttons) {
            if (btn.innerText === correct) btn.classList.add('correct-ans');
        }
    }
    saveMissedIds(missedIds);
    setTimeout(nextQuestion, 1100); // 1.1秒後に次のランダム問題へ自動移行
}

function timeOver() {
    if (hasAnswered) return;
    hasAnswered = true;

    const currentQ = currentPool[currentIndex];
    const optionsContainer = document.getElementById('options-container');
    const buttons = optionsContainer.getElementsByClassName('option-btn');
    const feedback = document.getElementById('feedback-text');
    
    feedback.innerText = `⏰ タイムオーバー！（正解: ${currentQ.a}）`;
    feedback.className = 'feedback incorrect-text';

    // タイムオーバーも自動的に弱点登録
    let missedIds = getMissedIds();
    if (!missedIds.includes(currentQ.id)) missedIds.push(currentQ.id);
    saveMissedIds(missedIds);

    for (let btn of buttons) {
        if (btn.innerText === currentQ.a) btn.classList.add('correct-ans');
    }

    setTimeout(nextQuestion, 1100);
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentPool.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    clearInterval(timerInterval);
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('timer-wraper').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / ${currentPool.length} 問正解`;
}

function clearData() {
    if (confirm('弱点克服モードのストックをすべて削除しますか？')) {
        localStorage.removeItem('missed_questions');
        updateReviewCount();
        showMenu();
    }
}

updateReviewCount();
</script>
